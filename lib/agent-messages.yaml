# Agent-facing messages returned by the askhuman.app API.
# Use {PLACEHOLDER} for template variables.
#
# Happy-path messages come first, grouped by flow.
# Error/validation messages follow at the bottom.

# =============================================================================
# PLAN REVIEW -- happy path
# =============================================================================

plan_instructions: |-
  - Open the review page in the same user's browser you are already interacting with.
    Try Chrome app mode for a clean window:
     "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" --app="{URL}" &
    Or fall back to: open "{URL}" / xdg-open "{URL}"
    Or just show the URL to the user (they cannot see this text).
  - Poll for the user's comments (returns when they click Done):
     curl -s {POLL_URL}
  - When status is "comments", address each numbered comment.

plan_comments: >-
  The reviewer is done. Address each numbered comment below.

plan_timeout: >-
  No new comments yet. The human may still be reviewing. Poll again.

plan_done: >-
  The human has finished reviewing. No further polling needed.

plan_change_pickup_diff: >-
  If you make code changes in response to these comments, resubmit the
  updated diff with a fresh POST to /diff so the reviewer can see the new
  code.

plan_change_pickup_files: >-
  If you make code changes in response to these comments, re-upload all
  files with a fresh POST to /files so the reviewer can see the updated
  code.

plan_change_pickup_generic: >-
  If you make code changes in response to these comments, make sure the same
  user can review the updated result. Start a fresh review session with the
  updated plan or diff when needed.

# =============================================================================
# DIFF REVIEW -- happy path
# =============================================================================

diff_created: |
  Diff review session created.

  Open the review page for the user. Try Chrome app mode for a
  clean window:
    "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" --app="{BASE_URL}/s/{SESSION_ID}" &
  Or fall back to: open "{BASE_URL}/s/{SESSION_ID}"
  Or just show the URL to the user (they cannot see this text).

  Poll for reviewer comments (returns when they click Done):
    curl -s "{BASE_URL}/diff/{SESSION_ID}/poll"

  After code changes, resubmit the updated diff:
    curl -s -X POST "{BASE_URL}/diff" \
      -F sessionId={SESSION_ID} \
      -F description=@description.md \
      -F diff=@current.diff

  When status is "comments", address each numbered comment.

diff_updated: >-
  Diff updated. Comments on changed hunks are now marked outdated.
  Continue polling for new comments.

diff_done: >-
  The review session is complete. No further polling needed.

# =============================================================================
# FILE REVIEW -- happy path
# =============================================================================

file_created: |
  File review session created with {FILE_COUNT} file(s).

  Open the review page for the user. Try Chrome app mode for a
  clean window:
    "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" --app="{BASE_URL}/s/{SESSION_ID}" &
  Or fall back to: open "{BASE_URL}/s/{SESSION_ID}"
  Or just show the URL to the user (they cannot see this text).

  Poll for reviewer comments (returns when they click Done):
    curl -s "{BASE_URL}/files/{SESSION_ID}/poll"

  After code changes, re-upload all files:
    curl -s -X POST "{BASE_URL}/files" \
      -F sessionId={SESSION_ID} \
      -F "path/to/file.ts=<path/to/file.ts"

  Files not included in a re-upload are removed from the review.
  When status is "comments", address each numbered comment.

file_updated: >-
  Files updated ({FILE_COUNT} file(s)). Comments on removed files
  are now marked outdated. Continue polling for new comments.

file_already_done: >-
  This review session is already complete. Create a new file review
  session instead.

file_no_files: >-
  No files provided. Include at least one file as a form field where the
  field name is the file path and the value is the file content.

# =============================================================================
# PLAYGROUND -- happy path
# =============================================================================

playground_created: |
  Playground session created.

  Open the playground for the user. Try Chrome app mode for a
  clean window:
    "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" --app="{BASE_URL}/s/{SESSION_ID}" &
  Or fall back to: open "{BASE_URL}/s/{SESSION_ID}"
  Or just show the URL to the user (they cannot see this text).

  Poll for the result (returns when the user clicks Done):
    curl -s "{BASE_URL}/playground/{SESSION_ID}/poll"

  The HTML can send results back via:
    window.parent.postMessage(
      { type: 'askhuman:result', data: '...' }, '*'
    )

  After changes, update the playground HTML:
    curl -s -X POST "{BASE_URL}/playground" \
      -F sessionId={SESSION_ID} \
      -F "html=<playground.html"

playground_updated: >-
  Playground updated with new HTML. Continue polling for the result.

playground_no_html: >-
  Missing "html" field. Submit the playground HTML as a multipart
  form field named "html".

# =============================================================================
# CONNECTION / PRESENCE -- shared across plan and diff
# =============================================================================

plan_not_connected: >-
  The same user you are already interacting with has not connected yet.
  Open it for them with Chrome app mode:
  "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome"
  --app="{URL}" &
  Or fall back to: open "{URL}" / xdg-open "{URL}"
  Or just show the URL to the user.

plan_no_human: >-
  No human reviewer tabs have been connected to this session for at
  least 5 seconds. Ask the same user you are already interacting with
  to open {URL} again, or open it for them with: open "{URL}"

# =============================================================================
# ERRORS -- diff lifecycle
# =============================================================================

diff_already_done: >-
  This review session is already complete. Create a new diff review session
  instead.

# =============================================================================
# ERRORS -- patch matching
# =============================================================================

match_empty_diff: >-
  Diff body is empty. Submit a non-empty diff.

match_no_hunks: >-
  Diff body did not contain any parseable hunks. Submit a unified git diff
  with at least one hunk.

# =============================================================================
# ERRORS -- route-level (wrong method / bad input)
# =============================================================================

route_diff_get: >-
  POST a diff body to create a diff review session

route_plan_get: >-
  POST a markdown body to create a plan review session

route_diff_reply_get: >-
  POST replies to this endpoint

route_plan_reply_get: >-
  POST replies to this endpoint

route_files_get: >-
  POST files to create a file review session

route_files_reply_get: >-
  POST replies to this endpoint

# =============================================================================
# ERRORS -- form field validation
# =============================================================================

form_missing_field: >-
  Missing multipart field "{FIELD}".

form_mismatched_replies: >-
  Mismatched reply fields. Provide the same number of "threadId" and "text"
  form fields.
