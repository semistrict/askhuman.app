file_doc_created: |
  Review session created for markdown file {FILE_PATH}.

  Open the review page for the user. Try Chrome app mode for a
  clean window:
    "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" --app="{BASE_URL}/s/{SESSION_ID}" &
  Or fall back to: open "{BASE_URL}/s/{SESSION_ID}"
  Or just show the URL to the user (they cannot see this text).

  Submit the markdown to this session:
    curl -s -X POST "{BASE_URL}/review/{SESSION_ID}" \
      -F "{FILE_PATH}=<{FILE_PATH}"

  That call waits for the reviewer and returns when they click Request Revision.
  Standalone poll is also available:
    curl -s "{BASE_URL}/review/{SESSION_ID}/poll"

  To include a general response for the reviewer on update:
    curl -s -X POST "{BASE_URL}/review/{SESSION_ID}" \
      -F "{FILE_PATH}=<{FILE_PATH}" \
      -F 'response=Addressed the requested revisions.'

file_created: |
  Review session created with {FILE_COUNT} file(s).

  Open the review page for the user. Try Chrome app mode for a
  clean window:
    "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" --app="{BASE_URL}/s/{SESSION_ID}" &
  Or fall back to: open "{BASE_URL}/s/{SESSION_ID}"
  Or just show the URL to the user (they cannot see this text).

  Submit the files to this session:
    curl -s -X POST "{BASE_URL}/review/{SESSION_ID}" \
      -F "path/to/file.ts=<path/to/file.ts"

  That call waits for the reviewer and returns when they click Done.
  Standalone poll is also available:
    curl -s "{BASE_URL}/review/{SESSION_ID}/poll"

  Files not included in a re-upload are removed from the review.
  When the review is returned, address each numbered comment.

file_updated: >-
  Review updated with {FILE_COUNT} file(s). Comments on removed files
  are now marked outdated. Continue polling for new comments.

file_doc_done: |-
  Feedback is ready. Address each numbered comment below, then upload the
  updated markdown file:
    curl -s -X POST {BASE_URL}/review/{SESSION_ID} \
      -F "{FILE_PATH}=<{FILE_PATH}"

  To include a general response for the reviewer:
    curl -s -X POST {BASE_URL}/review/{SESSION_ID} \
      -F "{FILE_PATH}=<{FILE_PATH}" \
      -F 'response=Addressed the requested revisions.'

file_doc_updated: >-
  Markdown file updated ({FILE_PATH}). The reviewer can comment on the new
  revision.

file_already_done: >-
  This review session is already complete. Create a new review
  session instead.

file_no_files: >-
  No files provided. Include at least one file as a form field where the
  field name is the file path and the value is the file content.
