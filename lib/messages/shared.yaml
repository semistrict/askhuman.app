# Connection / presence -- shared across all tools

plan_not_connected: >-
  No human reviewer is connected yet. Open {URL} for the same user now.
  Prefer Chrome app mode:
  "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome"
  --app="{URL}" &
  Fallback: open "{URL}" / xdg-open "{URL}"

plan_no_human: >-
  No human reviewer tab has connected to this session for at least
  5 seconds. Ask the same user to open {URL} again, or open it for
  them with: open "{URL}"

# Diff parsing errors

match_empty_diff: >-
  Diff body is empty. Submit a non-empty diff.

match_no_hunks: >-
  Diff body did not contain any parseable hunks. Submit a unified git diff
  with at least one hunk.

# Route-level errors

route_diff_get: >-
  POST this endpoint with no body to create a diff review session. Then submit
  the actual diff to POST /diff/{id}.

route_plan_get: >-
  POST this endpoint with no body to create a markdown review session.
  Then submit the actual markdown to POST /review/{id}. /plan is a
  compatibility alias.

route_diff_reply_get: >-
  POST replies to this endpoint

route_plan_reply_get: >-
  POST replies to this endpoint, or use POST /review/{id} to upload a revised markdown file.
  /plan is a compatibility alias.

route_plan_update_get: >-
  POST updated markdown to this endpoint to revise the current markdown review session.
  Prefer POST /review/{id}.

route_files_get: >-
  POST this endpoint with no body to create a review session. Then submit the
  actual files to POST /review/{id}. /files is a compatibility alias;
  prefer POST /review.

route_review_get: >-
  POST this endpoint with no body to create a review session. Then submit the
  actual files to POST /review/{id}.

route_present_get: >-
  POST this endpoint with no body to create a presentation review session.
  Then submit the actual markdown to POST /present/{id}.

route_present_reply_get: >-
  POST replies to this endpoint

route_files_reply_get: >-
  POST replies to this endpoint. /files/{id}/reply is a compatibility alias;
  prefer /review/{id}/reply.

# Form field validation

form_missing_field: >-
  Missing multipart field "{FIELD}".

form_mismatched_replies: >-
  Mismatched reply fields. Provide the same number of "threadId" and "text"
  form fields.
