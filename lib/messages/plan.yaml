plan_instructions: |-
  - Open the review page in the same user's browser you are already interacting with.
    Try Chrome app mode for a clean window:
     "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" --app="{URL}" &
    Or fall back to: open "{URL}" / xdg-open "{URL}"
    Or just show the URL to the user (they cannot see this text).
  - Poll for feedback (returns when the reviewer clicks Request Revision):
     curl -s {POLL_URL}
  - When feedback is returned, address each numbered comment and upload the updated file:
     curl -s -X POST {BASE_URL}/review/{SESSION_ID} \
       -F "{FILE_PATH}=<{FILE_PATH}"
  - To include a general response for the reviewer on update:
     curl -s -X POST {BASE_URL}/review/{SESSION_ID} \
       -F "{FILE_PATH}=<{FILE_PATH}" \
       -F 'response=Addressed the requested revisions.'

plan_comments: >-
  Review complete. Address each numbered comment below.

plan_timeout: >-
  No new comments yet. The human may still be reviewing. Poll again.

plan_done: >-
  The human has finished reviewing. No further polling needed.

plan_change_pickup_diff: >-
  If you make code changes in response to these comments, resubmit the
  updated diff with a fresh POST to /diff so the reviewer can see the new
  code.

plan_change_pickup_files: >-
  If you make code changes in response to these comments, re-upload all
  files with a fresh POST to /review so the reviewer can see the updated
  code.

plan_change_pickup_generic: >-
  If you make code changes in response to these comments, make sure the same
  user can review the updated result. Update this session or start a fresh
  review session with the new material when needed.

doc_comments: >-
  Feedback is ready. Address each numbered comment below, then submit the
  updated markdown file to {UPDATE_URL}. That call will wait for the reviewer
  again and return the next completed review.

doc_timeout: >-
  No revision request yet. The human may still be reviewing. Poll again.

doc_done: |-
  Feedback is ready. Address each numbered comment below, then submit the
  updated markdown file:
    curl -s -X POST {UPDATE_URL} \
      -F "markdown=<doc.md"

  To include a general response for the reviewer:
    curl -s -X POST {UPDATE_URL} \
      -F "markdown=<doc.md" \
      -F 'response=Addressed the requested revisions.'

doc_processing: >-
  Agent processing feedback...

doc_review_complete: >-
  Review complete. No further revisions requested.

doc_agent_not_polling: >-
  Agent is not polling. The current feedback will be copied to the clipboard
  so you can paste it into the agent manually.

doc_updated: >-
  Markdown file updated. The reviewer can comment on the new revision.

doc_update_missing_markdown: >-
  Missing updated markdown. Submit the revised markdown file as the request body or as a
  multipart field named "markdown".
