diff_created: |
  Diff review session created.

  Open the review page for the user. Try Chrome app mode for a
  clean window:
    "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" --app="{BASE_URL}/s/{SESSION_ID}" &
  Or fall back to: open "{BASE_URL}/s/{SESSION_ID}"
  Or just show the URL to the user (they cannot see this text).

  Poll for the completed review (returns when they click Done):
    curl -s "{BASE_URL}/diff/{SESSION_ID}/poll"

  After code changes, resubmit the updated diff:
    curl -s -X POST "{BASE_URL}/diff" \
      -F sessionId={SESSION_ID} \
      -F description=@description.md \
      -F diff=@current.diff

  When the review is returned, address each numbered comment.

  IMPORTANT: The description MUST narrate the change. Do not just
  submit a diff with a bare title. Describe WHY each file changed,
  what the reviewer should focus on, and break large changes into
  sections with markdown headings (## per file or logical group).
  The server validates that descriptions have enough headers,
  enough prose (>= 5% of diff lines), and no section longer
  than 200 lines. Submissions that fail these checks are rejected.

diff_updated: >-
  Diff updated. Comments on changed hunks are now marked outdated.
  Continue polling for new comments.

diff_done: >-
  The review session is complete. No further polling needed.

diff_already_done: >-
  This review session is already complete. Create a new diff review session
  instead.

diff_description_no_headers: >-
  The description must be valid markdown with headers (# or ##) to
  organize the review. Add at least one header per ~100 lines.
  Current: {HEADER_COUNT} header(s) for {LINE_COUNT} lines.

diff_description_section_too_long: >-
  Section "{SECTION}" is {SECTION_LINES} lines long. Keep each
  section under 200 lines so the reviewer can navigate easily.
  Split it into smaller subsections.

diff_description_too_little_prose: >-
  The description has only {PROSE_LINES} lines of prose for a
  {DIFF_LINES}-line diff ({PERCENT}%). Write at least 5% as many
  lines of description as the diff (capped at 200 lines) to give
  the reviewer context.
